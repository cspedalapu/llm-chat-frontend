services:
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: llm-chat-frontend-dev
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://host.docker.internal:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      target: production
    container_name: llm-chat-frontend-prod
    ports:
      - "8080:80"

