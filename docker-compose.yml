services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: llm-chat-backend
    command: uvicorn backend.app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend

  frontend:
    depends_on:
      - backend
    build:
      context: ./frontend
      target: development
    container_name: llm-chat-frontend-dev
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

  frontend-prod:
    profiles: ["prod"]
    depends_on:
      - backend
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: llm-chat-frontend-prod
    ports:
      - "8080:80"
